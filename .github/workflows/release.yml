name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify build output
        run: |
          test -f dist/cli.js || exit 1
          echo "Build verification passed!"

      - name: Generate API docs
        run: pnpm docs:site

      - name: Package docs
        run: zip -r merge-mentor-docs-${{ steps.version.outputs.VERSION }}.zip docs/site/

      - name: Create NPM package
        run: pnpm pack

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "RELEASE_NAME=v${VERSION}" >> $GITHUB_OUTPUT

          # Extract changelog section for this version if it exists
          if grep -q "## \[${VERSION}\]" CHANGELOG.md 2>/dev/null; then
            echo "Found changelog entry for version ${VERSION}"
            awk "/## \[${VERSION}\]/,/## \[/" CHANGELOG.md | sed '1d;$d' > release_notes.md
          else
            echo "Release ${VERSION}" > release_notes.md
            echo "" >> release_notes.md
            echo "See CHANGELOG.md for details." >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_notes.outputs.RELEASE_NAME }}
          body_path: release_notes.md
          files: |
            merge-mentor-${{ steps.version.outputs.VERSION }}.tgz
            merge-mentor-docs-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish merge-mentor-${{ steps.version.outputs.VERSION }}.tgz
