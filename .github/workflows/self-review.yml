name: Self Review

on:
  pull_request:
    types:
      - opened

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: self-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review pull request
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'renovate[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm build

      - name: Run self review
        run: pnpm start review --ci --write --strategy fast
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_MENTOR_GITHUB_TOKEN }}
          MM_COPILOT_TOKEN: ${{ secrets.MERGE_MENTOR_COPILOT_TOKEN }}
          MM_AI_MODEL: ${{ vars.MERGE_MENTOR_COPILOT_MODEL }}
