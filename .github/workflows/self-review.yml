name: Self Review

on:
  pull_request:
    types:
      - opened

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: self-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review pull request
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'renovate[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Build CLI
        run: pnpm build

      - name: Run self review
        run: pnpm start review --ci --write
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_MENTOR_GITHUB_TOKEN }}
          MM_COPILOT_TOKEN: ${{ secrets.MERGE_MENTOR_COPILOT_TOKEN }}
          MM_AI_PROVIDER: copilot-sdk
          MM_AI_MODEL: ${{ vars.MERGE_MENTOR_COPILOT_MODEL }}
          MM_REVIEW_TYPE: ${{ vars.MERGE_MENTOR_REVIEW_TYPE }}
          MM_REVIEW_RUNS: ${{ vars.MERGE_MENTOR_REVIEW_RUNS }}
