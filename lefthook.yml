pre-commit:
  commands:
    biome:
      run: pnpm exec biome check --write --no-errors-on-unmatched
      skip:
        - merge
    prettier:
      run: pnpm exec prettier --write "**/*.{md,yml}"
      skip:
        - merge

pre-push:
  commands:
    typecheck:
      run: pnpm typecheck
      skip:
        - merge
    knip:
      run: pnpm exec knip
      skip:
        - merge
    build:
      run: pnpm build
      skip:
        - merge
    test:
      run: pnpm test
      skip:
        - merge
